{% extends "layout.html" %}

{% block content %}

<div class="page-title">
  <div>
    <h1>Đặt lại Mật khẩu</h1>
    <p>Tạo mật khẩu mới để bảo vệ tài khoản</p>
  </div>
</div>

{% if error %}
<div class="result" style="background: rgba(220, 38, 38, 0.12); border-color: rgba(220, 38, 38, 0.25); margin-bottom: 1rem; padding: 0.75rem;">
  ❌ {{ error }}
</div>
{% endif %}

<div class="card">
  <form method="POST" class="form" id="resetForm">
    <label for="password">Mật khẩu mới</label>
    <div style="position: relative;">
      <input id="password" name="password" type="password" placeholder="Ít nhất 6 ký tự" required />
      <button type="button" id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.7); font-size: 1.2rem; padding: 0;">
        👁️
      </button>
    </div>
    <small style="color: rgba(255,255,255,0.5);">Ít nhất 6 ký tự, gồm chữ và số</small>

    <label for="confirm_password">Xác nhận mật khẩu</label>
    <div style="position: relative;">
      <input id="confirm_password" name="confirm_password" type="password" placeholder="Nhập lại mật khẩu" required />
      <button type="button" id="toggleConfirm" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.7); font-size: 1.2rem; padding: 0;">
        👁️
      </button>
    </div>
    <small style="color: rgba(255,255,255,0.5);" id="matchError"></small>

    <button type="submit">Đặt lại mật khẩu</button>
  </form>

  <p style="margin-top: 16px; text-align: center; color: rgba(255,255,255,0.72);">
    <a href="/login" style="color: #4da6ff; text-decoration: none;">← Quay lại đăng nhập</a>
  </p>
</div>

<script>
  const passwordInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirm_password');
  const togglePassword = document.getElementById('togglePassword');
  const toggleConfirm = document.getElementById('toggleConfirm');
  const matchError = document.getElementById('matchError');
  const form = document.getElementById('resetForm');
  
  // Toggle password 1
  togglePassword.addEventListener('click', function(e) {
    e.preventDefault();
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      togglePassword.textContent = '🙈';
    } else {
      passwordInput.type = 'password';
      togglePassword.textContent = '👁️';
    }
  });
  
  // Toggle password 2
  toggleConfirm.addEventListener('click', function(e) {
    e.preventDefault();
    if (confirmInput.type === 'password') {
      confirmInput.type = 'text';
      toggleConfirm.textContent = '🙈';
    } else {
      confirmInput.type = 'password';
      toggleConfirm.textContent = '👁️';
    }
  });
  
  // Check if passwords match
  confirmInput.addEventListener('input', function() {
    if (this.value && passwordInput.value !== this.value) {
      matchError.textContent = '❌ Mật khẩu không khớp';
      matchError.style.color = '#ff6b6b';
    } else if (this.value && passwordInput.value === this.value) {
      matchError.textContent = '✓ Mật khẩu khớp';
      matchError.style.color = '#4da6ff';
    } else {
      matchError.textContent = '';
    }
  });
  
  form.addEventListener('submit', function(e) {
    const password = passwordInput.value;
    const confirm = confirmInput.value;
    
    if (password !== confirm) {
      e.preventDefault();
      alert('Mật khẩu không khớp');
      return;
    }
    
    if (password.length < 6) {
      e.preventDefault();
      alert('Mật khẩu phải ít nhất 6 ký tự');
      return;
    }
    
    if (!/[a-zA-Z]/.test(password) || !/\d/.test(password)) {
      e.preventDefault();
      alert('Mật khẩu phải gồm chữ cái và số');
      return;
    }
  });
</script>

{% endblock %}

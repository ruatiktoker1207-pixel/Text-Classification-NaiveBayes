{% extends "layout.html" %}

{% block content %}

<div class="page-title">
  <div>
    <h1>Quên Mật khẩu</h1>
    <p>Nhập email để nhận mã OTP</p>
  </div>
</div>

{% if error %}
<div class="result" style="background: rgba(220, 38, 38, 0.12); border-color: rgba(220, 38, 38, 0.25); margin-bottom: 1rem; padding: 0.75rem;">
  ❌ {{ error }}
</div>
{% endif %}

{% if message %}
<div class="result" style="background: rgba(34, 197, 94, 0.12); border-color: rgba(34, 197, 94, 0.25); margin-bottom: 1rem; padding: 0.75rem;">
  ✓ {{ message }}
</div>
{% endif %}

<div class="card">
  <form method="POST" class="form">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" placeholder="Nhập email đăng ký của bạn" required />
    <small style="color: rgba(255,255,255,0.5);">Chúng tôi sẽ gửi mã OTP tới email này</small>

    <button type="submit">Gửi mã OTP</button>
  </form>

  <div style="margin-top: 16px;">
    <p style="text-align: center; color: rgba(255,255,255,0.72); margin: 8px 0;">
      <a href="/login" style="color: #4da6ff; text-decoration: none;">← Quay lại đăng nhập</a>
    </p>
    <p style="text-align: center; color: rgba(255,255,255,0.72); margin: 8px 0;">
      Chưa có tài khoản? <a href="/register" style="color: #4da6ff; text-decoration: none;">Đăng ký ngay</a>
    </p>
  </div>
</div>

<script>
  const form = document.querySelector('form');
  const emailInput = document.getElementById('email');

  form.addEventListener('submit', function(e) {
    const email = emailInput.value.trim();
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    
    if (!emailRegex.test(email)) {
      e.preventDefault();
      alert('Email không hợp lệ');
    }
  });
</script>

{% endblock %}

{% extends "layout.html" %}

{% block content %}

<div class="page-title">
  <div>
    <h1>Người dùng</h1>
    <p>Danh sách tài khoản đã đăng ký.</p>
  </div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Username</th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ loop.index }}</td>
        <td>{{ u[1] }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}

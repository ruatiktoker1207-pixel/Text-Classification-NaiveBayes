<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phân loại văn bản AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="{{ body_class|default('') }}">

<div class="container">
  <aside class="sidebar">
    <h2 class="brand"><span>🧠</span> Phân loại văn bản AI</h2>

    <div class="user-info">
      <div><strong>Người dùng:</strong></div>
      <div>{{ session.get('username', 'Không có') }}</div>
    </div>

    <nav class="nav-links">
      <a href="/" class="{{ 'active' if request.path == '/' else '' }}">Bảng điều khiển</a>
      <a href="/test_model" class="{{ 'active' if request.path == '/test_model' else '' }}">Kiểm tra mô hình</a>
      <a href="/history" class="{{ 'active' if request.path == '/history' else '' }}">Lịch sử</a>
      <a href="/dataset" class="{{ 'active' if request.path == '/dataset' else '' }}">Dữ liệu</a>
      <a href="/users" class="{{ 'active' if request.path == '/users' else '' }}">Người dùng</a>
      <a href="/profile" class="{{ 'active' if request.path == '/profile' else '' }}">Hồ sơ</a>
      <a href="/logout">Đăng xuất</a>
    </nav>

    <button class="theme-toggle" onclick="toggleMode()">Chuyển chủ đề</button>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>

<!-- Chat widget -->
<div id="chat-widget" class="chat-widget">
  <div class="chat-header">
    <span>Hỗ trợ AI</span>
    <button id="chat-close" class="chat-close" aria-label="Close chat">×</button>
  </div>
  <div id="chat-body" class="chat-body"></div>
  <form id="chat-form" class="chat-form">
    <input id="chat-input" type="text" placeholder="Gõ tin nhắn..." autocomplete="off" />
    <button type="submit">Gửi</button>
  </form>
</div>

<!-- Chat toggle button -->
<button id="chat-toggle" class="chat-toggle" aria-label="Open chat">💬</button>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
